name: erp-execution-cloud

on:
  schedule:
    # 09:00 Asia/Shanghai on the 13th and 28th of every month.
    - cron: "0 1 13 * *"
    - cron: "0 1 28 * *"
  workflow_dispatch:
    inputs:
      push_summary:
        description: "Push ERP execution summary to Feishu webhook after generation"
        required: false
        default: true
        type: boolean
      merged_signal_url:
        description: "Merged signal JSON URL produced by erp-relative-master-scheduler"
        required: false
        default: "https://index-compare-analysis.vercel.app/data/merged_signal.json"
        type: string
      execution_mode:
        description: "rebalance blocks stale holdings; research keeps stale holdings as warnings"
        required: false
        default: "rebalance"
        type: choice
        options:
          - rebalance
          - research
      as_of:
        description: "Optional unified signal cutoff date (YYYY-MM-DD)"
        required: false
        default: ""
        type: string
      portfolio_snapshot_as_of:
        description: "Optional portfolio snapshot date for strict holdings freshness checks (YYYY-MM-DD)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: erp-execution-cloud
  cancel-in-progress: false

jobs:
  run-erp-execution-cloud:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run ERP execution regression tests
        run: python -m unittest tests.test_erp_execution_cloud_logic

      - name: Resolve push mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "ERP_EXECUTION_PUSH_SUMMARY=true" >> "$GITHUB_ENV"
          elif [ "${{ inputs.push_summary }}" = "true" ]; then
            echo "ERP_EXECUTION_PUSH_SUMMARY=true" >> "$GITHUB_ENV"
          else
            echo "ERP_EXECUTION_PUSH_SUMMARY=false" >> "$GITHUB_ENV"
          fi

      - name: Download latest merged signal
        env:
          ERP_MERGED_SIGNAL_URL: ${{ inputs.merged_signal_url || 'https://index-compare-analysis.vercel.app/data/merged_signal.json' }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          url = os.environ["ERP_MERGED_SIGNAL_URL"].strip()
          summary_lines = ["## ERP execution signal source", ""]
          if not url:
              summary_lines.append("- Merged signal URL: `<empty>`")
              summary_lines.append("- Source: `Feishu OpenAPI fallback`")
              Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
              raise SystemExit(0)

          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))

              components = payload.get("components") or {}
              erp = components.get("erp") or {}
              relative = components.get("relative") or {}
              if not erp.get("records"):
                  raise ValueError("Merged signal missing ERP records")
              if not relative.get("records"):
                  raise ValueError("Merged signal missing relative records")

              temp_dir = Path(os.environ["RUNNER_TEMP"])
              erp_path = temp_dir / "erp_signal.json"
              relative_path = temp_dir / "relative_signal.json"
              erp_path.write_text(json.dumps(erp, ensure_ascii=False, indent=2), encoding="utf-8")
              relative_path.write_text(json.dumps(relative, ensure_ascii=False, indent=2), encoding="utf-8")

              with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
                  env_file.write(f"ERP_EXEC_ERP_SIGNAL_JSON={erp_path}\n")
                  env_file.write(f"ERP_EXEC_RELATIVE_SIGNAL_JSON={relative_path}\n")

              summary_lines.extend([
                  f"- Merged signal URL: `{url}`",
                  "- Source: `merged_signal.json`",
                  f"- ERP latest date: `{erp.get('latest_date', '-')}`",
                  f"- Relative latest date: `{relative.get('latest_date', '-')}`",
                  f"- ERP records: `{len(erp.get('records', []))}`",
                  f"- Relative records: `{len(relative.get('records', []))}`",
              ])
          except (urllib.error.URLError, TimeoutError, json.JSONDecodeError, ValueError) as exc:
              print(f"::warning::Merged signal unavailable; falling back to Feishu OpenAPI: {exc}")
              summary_lines.extend([
                  f"- Merged signal URL: `{url}`",
                  "- Source: `Feishu OpenAPI fallback`",
                  f"- Fallback reason: `{exc}`",
              ])

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write("\n".join(summary_lines) + "\n")
          PY

      - name: Run ERP execution workflow
        run: |
          if [ "$ERP_EXECUTION_PUSH_SUMMARY" = "true" ]; then
            python orchestrator/run_erp_execution_cloud.py --execution-mode "$ERP_EXECUTION_MODE" --as-of "$ERP_EXECUTION_AS_OF" --portfolio-snapshot-as-of "$ERP_PORTFOLIO_SNAPSHOT_AS_OF" --push-summary
          else
            python orchestrator/run_erp_execution_cloud.py --execution-mode "$ERP_EXECUTION_MODE" --as-of "$ERP_EXECUTION_AS_OF" --portfolio-snapshot-as-of "$ERP_PORTFOLIO_SNAPSHOT_AS_OF"
          fi
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          ERP_EXEC_ERP_APP_TOKEN: ${{ secrets.ERP_EXEC_ERP_APP_TOKEN || secrets.ERP_FEISHU_APP_TOKEN || secrets.FEISHU_APP_TOKEN }}
          ERP_EXEC_ERP_TABLE_ID: ${{ secrets.ERP_EXEC_ERP_TABLE_ID || secrets.ERP_FEISHU_TABLE_ID || secrets.FEISHU_TABLE_ID }}
          ERP_EXEC_RELATIVE_APP_TOKEN: ${{ secrets.ERP_EXEC_RELATIVE_APP_TOKEN || secrets.CSI_FEISHU_APP_TOKEN || secrets.FEISHU_APP_TOKEN }}
          ERP_EXEC_RELATIVE_TABLE_ID: ${{ secrets.ERP_EXEC_RELATIVE_TABLE_ID || secrets.CSI_FEISHU_TABLE_ID || secrets.FEISHU_TABLE_ID }}
          ERP_EXEC_ASSET_APP_TOKEN: ${{ secrets.ERP_EXEC_ASSET_APP_TOKEN }}
          ERP_EXEC_ASSET_TABLE_ID: ${{ secrets.ERP_EXEC_ASSET_TABLE_ID }}
          ERP_DAILY_FEISHU_WEBHOOK_URL: ${{ secrets.ERP_DAILY_FEISHU_WEBHOOK_URL }}
          ERP_DAILY_FEISHU_WEBHOOK_SECRET: ${{ secrets.ERP_DAILY_FEISHU_WEBHOOK_SECRET }}
          ERP_EXECUTION_PUSH_SUMMARY: ${{ env.ERP_EXECUTION_PUSH_SUMMARY }}
          ERP_EXECUTION_MODE: ${{ inputs.execution_mode || 'rebalance' }}
          ERP_EXECUTION_AS_OF: ${{ inputs.as_of || '' }}
          ERP_PORTFOLIO_SNAPSHOT_AS_OF: ${{ inputs.portfolio_snapshot_as_of || '' }}

      - name: Validate ERP execution artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          plan_path = Path("orchestrator/output/erp_execution_plan.json")
          summary_path = Path("orchestrator/output/erp_daily_summary.md")
          if not plan_path.exists():
              raise SystemExit("Missing ERP execution plan artifact")
          if not summary_path.exists():
              raise SystemExit("Missing ERP daily summary artifact")

          plan = json.loads(plan_path.read_text(encoding="utf-8"))
          portfolio = plan.get("portfolio", {})
          positions = plan.get("portfolio", {}).get("positions", [])
          total_weight = sum(float(item.get("target_weight", 0)) for item in positions)
          if abs(total_weight - 1.0) > 0.0015:
              raise SystemExit(f"Target weights must sum to 100%, got {total_weight:.4%}")

          health = plan.get("signals", {}).get("data_health", {})
          if health.get("errors"):
              raise SystemExit("Data health check failed: " + "; ".join(health["errors"]))

          defensive_value = next((item for item in positions if item.get("bucket") == "sh50"), None)
          if defensive_value is None:
              raise SystemExit("Missing defensive value bucket sh50 in ERP execution plan")
          if defensive_value.get("label") not in ("防守价值（上证50）", "防守价值(上证50)"):
              raise SystemExit(f"Unexpected sh50 label: {defensive_value.get('label')}")

          breakdown = defensive_value.get("holding_breakdown", [])
          lines = [
              "## ERP execution validation",
              "",
              f"- Generated at: `{plan.get('generated_at', '-')}`",
              f"- As of: `{health.get('as_of', '-')}`",
              f"- Managed amount: `{portfolio.get('managed_amount', 0):,.2f}`",
              f"- Target weight sum: `{total_weight:.4%}`",
              f"- Data dates: `{health.get('dates', {})}`",
              f"- Defensive value current amount: `{defensive_value.get('current_amount', 0):,.2f}`",
              f"- Defensive value target amount: `{defensive_value.get('target_amount', 0):,.2f}`",
          ]
          if health.get("warnings"):
              lines.extend(["", "### Warnings"])
              lines.extend(f"- {item}" for item in health["warnings"])
          lines.extend(["", "### Defensive value holdings"])
          if breakdown:
              lines.extend(f"- `{item.get('name', '-')}`: `{item.get('amount', 0):,.2f}`" for item in breakdown)
          else:
              lines.append("- No current holdings mapped to this bucket.")

          summary_file = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload ERP execution artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: erp-execution-cloud-${{ github.run_id }}
          path: |
            orchestrator/output/erp_execution_plan.json
            orchestrator/output/erp_daily_summary.md
          if-no-files-found: warn
          retention-days: 30
