name: erp-execution-cloud

on:
  schedule:
    # 09:00 Asia/Shanghai on the 13th and 28th of every month.
    - cron: "0 1 13 * *"
    - cron: "0 1 28 * *"
  workflow_dispatch:
    inputs:
      push_summary:
        description: "Push ERP execution summary to Feishu webhook after generation"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: erp-execution-cloud
  cancel-in-progress: false

jobs:
  run-erp-execution-cloud:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Resolve push mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "ERP_EXECUTION_PUSH_SUMMARY=true" >> "$GITHUB_ENV"
          elif [ "${{ inputs.push_summary }}" = "true" ]; then
            echo "ERP_EXECUTION_PUSH_SUMMARY=true" >> "$GITHUB_ENV"
          else
            echo "ERP_EXECUTION_PUSH_SUMMARY=false" >> "$GITHUB_ENV"
          fi

      - name: Run ERP execution workflow
        run: |
          if [ "$ERP_EXECUTION_PUSH_SUMMARY" = "true" ]; then
            python orchestrator/run_erp_execution_cloud.py --push-summary
          else
            python orchestrator/run_erp_execution_cloud.py
          fi
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          ERP_EXEC_ERP_APP_TOKEN: ${{ secrets.ERP_EXEC_ERP_APP_TOKEN || secrets.ERP_FEISHU_APP_TOKEN || secrets.FEISHU_APP_TOKEN }}
          ERP_EXEC_ERP_TABLE_ID: ${{ secrets.ERP_EXEC_ERP_TABLE_ID || secrets.ERP_FEISHU_TABLE_ID || secrets.FEISHU_TABLE_ID }}
          ERP_EXEC_RELATIVE_APP_TOKEN: ${{ secrets.ERP_EXEC_RELATIVE_APP_TOKEN || secrets.CSI_FEISHU_APP_TOKEN || secrets.FEISHU_APP_TOKEN }}
          ERP_EXEC_RELATIVE_TABLE_ID: ${{ secrets.ERP_EXEC_RELATIVE_TABLE_ID || secrets.CSI_FEISHU_TABLE_ID || secrets.FEISHU_TABLE_ID }}
          ERP_EXEC_ASSET_APP_TOKEN: ${{ secrets.ERP_EXEC_ASSET_APP_TOKEN }}
          ERP_EXEC_ASSET_TABLE_ID: ${{ secrets.ERP_EXEC_ASSET_TABLE_ID }}
          ERP_DAILY_FEISHU_WEBHOOK_URL: ${{ secrets.ERP_DAILY_FEISHU_WEBHOOK_URL }}
          ERP_DAILY_FEISHU_WEBHOOK_SECRET: ${{ secrets.ERP_DAILY_FEISHU_WEBHOOK_SECRET }}
          ERP_EXECUTION_PUSH_SUMMARY: ${{ env.ERP_EXECUTION_PUSH_SUMMARY }}

      - name: Validate ERP execution artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          plan_path = Path("orchestrator/output/erp_execution_plan.json")
          summary_path = Path("orchestrator/output/erp_daily_summary.md")
          if not plan_path.exists():
              raise SystemExit("Missing ERP execution plan artifact")
          if not summary_path.exists():
              raise SystemExit("Missing ERP daily summary artifact")

          plan = json.loads(plan_path.read_text(encoding="utf-8"))
          positions = plan.get("portfolio", {}).get("positions", [])
          defensive_value = next((item for item in positions if item.get("bucket") == "sh50"), None)
          if defensive_value is None:
              raise SystemExit("Missing defensive value bucket sh50 in ERP execution plan")
          if defensive_value.get("label") != "防守价值（上证50/红利）":
              raise SystemExit(f"Unexpected sh50 label: {defensive_value.get('label')}")

          breakdown = defensive_value.get("holding_breakdown", [])
          lines = [
              "## ERP execution validation",
              "",
              f"- Generated at: `{plan.get('generated_at', '-')}`",
              f"- Managed amount: `{plan.get('portfolio', {}).get('managed_amount', 0):,.2f}`",
              f"- Defensive value current amount: `{defensive_value.get('current_amount', 0):,.2f}`",
              f"- Defensive value target amount: `{defensive_value.get('target_amount', 0):,.2f}`",
              "",
              "### Defensive value holdings",
          ]
          if breakdown:
              lines.extend(f"- `{item.get('name', '-')}`: `{item.get('amount', 0):,.2f}`" for item in breakdown)
          else:
              lines.append("- No current holdings mapped to this bucket.")

          summary_file = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload ERP execution artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: erp-execution-cloud-${{ github.run_id }}
          path: |
            orchestrator/output/erp_execution_plan.json
            orchestrator/output/erp_daily_summary.md
          if-no-files-found: warn
          retention-days: 30
