name: erp-relative-master-scheduler

on:
  push:
    branches:
      - master
  schedule:
    # GitHub cron uses UTC (Mon-Fri):
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * 1-5"
    # 14:00 UTC = 22:00 Asia/Shanghai
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      force_relative:
        description: "Force Relative full update (true/false)"
        required: false
        default: "false"
        type: string
      erp_start_date:
        description: "Optional ERP start date (YYYYMMDD or YYYY-MM-DD)"
        required: false
        default: ""
        type: string
      erp_end_date:
        description: "Optional ERP end date (YYYYMMDD or YYYY-MM-DD)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: erp-relative-master-scheduler
  cancel-in-progress: false

jobs:
  run-master-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout CSI300 Relative Index
        uses: actions/checkout@v6
        with:
          path: csi300-relative-index

      - name: Checkout Equity Risk Premium
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.ERP_REPOSITORY || 'keycool/equity-risk-premium' }}
          token: ${{ secrets.CROSS_REPO_PAT || github.token }}
          path: external/equity-risk-premium

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            csi300-relative-index/.claude/skills/index-compare/requirements.txt
            external/equity-risk-premium/skills/equity-risk-premium/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r csi300-relative-index/.claude/skills/index-compare/requirements.txt
          pip install -r external/equity-risk-premium/skills/equity-risk-premium/requirements.txt

      - name: Run master orchestrator
        env:
          ERP_REPO_PATH: ${{ github.workspace }}/external/equity-risk-premium
          SHARED_DIR: ${{ github.workspace }}/shared

          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

          ERP_FEISHU_WEBHOOK_URL: ${{ secrets.ERP_FEISHU_WEBHOOK_URL || secrets.FEISHU_WEBHOOK_URL }}
          ERP_FEISHU_WEBHOOK_SECRET: ${{ secrets.ERP_FEISHU_WEBHOOK_SECRET || secrets.FEISHU_WEBHOOK_SECRET }}
          ERP_FEISHU_APP_TOKEN: ${{ secrets.ERP_FEISHU_APP_TOKEN || secrets.FEISHU_BASE_ID || secrets.FEISHU_APP_TOKEN }}
          ERP_FEISHU_TABLE_ID: ${{ secrets.ERP_FEISHU_TABLE_ID || secrets.FEISHU_TABLE_ID }}

          CSI_FEISHU_WEBHOOK_URL: ${{ secrets.CSI_FEISHU_WEBHOOK_URL || secrets.FEISHU_WEBHOOK_URL }}
          CSI_FEISHU_WEBHOOK_SECRET: ${{ secrets.CSI_FEISHU_WEBHOOK_SECRET || secrets.FEISHU_WEBHOOK_SECRET }}
          CSI_FEISHU_APP_TOKEN: ${{ secrets.CSI_FEISHU_APP_TOKEN || secrets.FEISHU_APP_TOKEN }}
          CSI_FEISHU_TABLE_ID: ${{ secrets.CSI_FEISHU_TABLE_ID || secrets.FEISHU_TABLE_ID }}

          REQUIRE_BITABLE_SYNC: "true"
          FORCE_RELATIVE: ${{ github.event.inputs.force_relative || 'false' }}
          ERP_START_DATE: ${{ github.event.inputs.erp_start_date || '' }}
          ERP_END_DATE: ${{ github.event.inputs.erp_end_date || '' }}
        working-directory: csi300-relative-index
        run: |
          set -euo pipefail

          if [[ -z "${TUSHARE_TOKEN:-}" ]]; then
            echo "::error::TUSHARE_TOKEN is required for ERP data refresh"
            exit 1
          fi

          CMD=(python orchestrator/main.py)

          if [[ "$FORCE_RELATIVE" == "true" ]]; then
            CMD+=(--force-relative)
          fi

          if [[ -n "$ERP_START_DATE" ]]; then
            CMD+=(--erp-start-date "$ERP_START_DATE")
          fi

          if [[ -n "$ERP_END_DATE" ]]; then
            CMD+=(--erp-end-date "$ERP_END_DATE")
          fi

          "${CMD[@]}"

      - name: Sync ERP data to configured Feishu table
        if: success()
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          ERP_FEISHU_APP_TOKEN: ${{ secrets.ERP_FEISHU_APP_TOKEN || secrets.FEISHU_BASE_ID }}
          ERP_FEISHU_TABLE_ID: ${{ secrets.ERP_FEISHU_TABLE_ID }}
        run: |
          python - << 'PY'
          import json, os, requests
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          erp_path = Path("shared/erp_signal.json")
          if not erp_path.exists():
              print("No erp_signal.json, skipping")
              exit(0)

          payload = json.loads(erp_path.read_text(encoding="utf-8"))
          records = payload.get("records", [])
          print(f"Records to sync: {len(records)}")
          print(f"ERP source latest_date: {payload.get('latest_date')}")
          if records:
              print(f"ERP last record date: {records[-1].get('date')}")

          app_id = os.environ["FEISHU_APP_ID"]
          app_secret = os.environ["FEISHU_APP_SECRET"]
          app_token = os.environ["ERP_FEISHU_APP_TOKEN"]
          table_id = os.environ["ERP_FEISHU_TABLE_ID"]
          if not app_id or not app_secret or not app_token or not table_id:
              raise SystemExit("Missing Feishu env: FEISHU_APP_ID/FEISHU_APP_SECRET/ERP_FEISHU_APP_TOKEN/ERP_FEISHU_TABLE_ID")
          print(f"Feishu target table_id: {table_id}")
          records_url = f"https://open.feishu.cn/open-apis/bitable/v1/apps/{app_token}/tables/{table_id}/records"
          r = requests.post(
              "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              json={"app_id": app_id, "app_secret": app_secret}, timeout=15,
          )
          r.raise_for_status()
          token = r.json()["tenant_access_token"]
          h = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          sh_tz = timezone(timedelta(hours=8))

          def to_feishu_date(value):
              try:
                  d = datetime.strptime(str(value)[:10], "%Y-%m-%d").replace(tzinfo=sh_tz)
                  return int(d.timestamp() * 1000)
              except Exception:
                  return value

          # Build date index so repeated runs update existing rows instead of duplicating them.
          print("Building date index...")
          existing_records = {}
          page_token = None
          while True:
              params = {"page_size": 500}
              if page_token:
                  params["page_token"] = page_token
              r_idx = requests.get(records_url, params=params, headers=h, timeout=30)
              r_idx.raise_for_status()
              data = r_idx.json().get("data", {})
              for item in data.get("items", []):
                  f = item.get("fields", {})
                  dt_val = f.get("日期")
                  record_id = item.get("record_id")
                  if dt_val and record_id:
                      existing_records[dt_val] = record_id
                      existing_records[to_feishu_date(dt_val)] = record_id
              if not data.get("has_more"):
                  break
              page_token = data.get("page_token")
          print(f"Existing dates: {len(existing_records)}")

          created = 0
          updated = 0
          failed = 0
          for rec in records:
              dt = rec.get("date", "")
              ts = to_feishu_date(dt)

              fields = {
                  "日期": ts,
                  "沪深300点位": rec.get("csi300_close", 0),
                  "PE_TTM": rec.get("pe_ttm", 0),
                  "10年国债收益率": rec.get("bond_yield", 0),
                  "盈利收益率": rec.get("earnings_yield", 0),
                  "股权溢价指数": rec.get("equity_premium", 0),
                  "数据源": "tushare+akshare",
              }
              try:
                  record_id = existing_records.get(ts)
                  if record_id:
                      r2 = requests.put(
                          f"{records_url}/{record_id}",
                          json={"fields": fields}, headers=h, timeout=15,
                      )
                      action = "UPDATE"
                  else:
                      r2 = requests.post(
                          records_url,
                          json={"fields": fields}, headers=h, timeout=15,
                      )
                      action = "CREATE"
                  if r2.status_code == 200 and r2.json().get("code") == 0:
                      if action == "UPDATE":
                          updated += 1
                      else:
                          created += 1
                  else:
                      failed += 1
                      if failed <= 5:
                          try:
                              err = r2.json()
                          except Exception:
                              err = {"text": r2.text[:200]}
                          print(f"  FAIL {action} {dt}: {r2.status_code} {str(err)[:300]}")
              except Exception as exc:
                  failed += 1
                  if failed <= 3:
                      print(f"  FAIL {dt}: {exc}")
              done = created + updated
              if done and done % 1000 == 0:
                  print(f"  Progress: {done}/{len(records)}")

          print(f"ERP sync done: {created} created, {updated} updated, {failed} failed, {len(records)} total")
          if failed:
              raise SystemExit(f"ERP Feishu sync failed: {failed} failed")
          if records and created + updated == 0:
              raise SystemExit("ERP Feishu sync wrote zero records")
          PY

      - name: Generate ERP dashboard artifact
        if: success()
        run: |
          python external/equity-risk-premium/dashboard/generate_dashboard_data.py

      - name: Upload master artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: erp-relative-master-${{ github.run_id }}
          path: |
            shared/*.json
            csi300-relative-index/index_compare_enhanced.xlsx
            csi300-relative-index/reports/index_compare_*.html
            csi300-relative-index/.claude/skills/index-compare/data/*.json
            csi300-relative-index/.claude/skills/index-compare/data/*.csv
            csi300-relative-index/orchestrator/output/*.json
            csi300-relative-index/orchestrator/output/*.md
            external/equity-risk-premium/equity_premium_enhanced.xlsx
            external/equity-risk-premium/dashboard/data/equity_premium.json
            external/equity-risk-premium/dashboard/data/equity_premium.js
            external/equity-risk-premium/dashboard/index.html
          if-no-files-found: warn
          retention-days: 7

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Build Pages site
        if: success()
        run: |
          python - << 'PY'
          import json
          import re
          import shutil
          from pathlib import Path

          workspace = Path.cwd()
          site_dir = workspace / "site"
          reports_dir = workspace / "csi300-relative-index" / "reports"
          shared_dir = workspace / "shared"
          dashboard_dir = workspace / "external" / "equity-risk-premium" / "dashboard" / "data"

          site_dir.mkdir(parents=True, exist_ok=True)
          (site_dir / ".nojekyll").write_text("", encoding="utf-8")

          prod_reports = sorted(
              p for p in reports_dir.glob("index_compare_*.html")
              if re.match(r"^index_compare_\d{8}_\d{6}\.html$", p.name)
          )
          if not prod_reports:
              raise FileNotFoundError(f"No production report file found in {reports_dir}")

          latest_report = max(prod_reports, key=lambda p: p.stat().st_mtime)
          shutil.copy2(latest_report, site_dir / "index.html")

          data_dir = site_dir / "data"
          data_dir.mkdir(parents=True, exist_ok=True)

          for path in shared_dir.glob("*.json"):
              shutil.copy2(path, data_dir / path.name)

          for name in ("equity_premium.json", "equity_premium.js"):
              source = dashboard_dir / name
              if source.exists():
                  shutil.copy2(source, data_dir / name)

          merged_path = shared_dir / "merged_signal.json"
          summary = {
              "latest_report": latest_report.name,
              "generated_files": sorted([p.name for p in data_dir.glob("*")]),
          }
          if merged_path.exists():
              try:
                  summary["merged_signal"] = json.loads(merged_path.read_text(encoding="utf-8"))
              except Exception:
                  summary["merged_signal"] = {"error": "failed_to_parse"}

          (site_dir / "site_manifest.json").write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"[PAGES] Latest report: {latest_report}")
          print(f"[PAGES] Site dir: {site_dir}")
          PY

      - name: Deploy to Vercel
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          npm install --global vercel@latest

          mkdir -p site/.vercel
          cat > site/.vercel/project.json <<EOF
          {
            "orgId": "$VERCEL_ORG_ID",
            "projectId": "$VERCEL_PROJECT_ID"
          }
          EOF

          cd site
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    if: success()
    needs: run-master-orchestrator
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
