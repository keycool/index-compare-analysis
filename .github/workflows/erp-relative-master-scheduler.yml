name: erp-relative-master-scheduler

on:
  push:
    branches:
      - master
  schedule:
    # GitHub cron uses UTC:
    # 12:00 UTC = 20:00 Asia/Shanghai
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      force_relative:
        description: "Force Relative full update (true/false)"
        required: false
        default: "false"
        type: string
      erp_start_date:
        description: "Optional ERP start date (YYYYMMDD or YYYY-MM-DD)"
        required: false
        default: ""
        type: string
      erp_end_date:
        description: "Optional ERP end date (YYYYMMDD or YYYY-MM-DD)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: erp-relative-master-scheduler
  cancel-in-progress: true

jobs:
  run-master-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      should_run: ${{ steps.preflight.outputs.should_run }}

    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preflight Tushare freshness check
        id: preflight
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          LATEST_SIGNAL_URL: https://index-compare-analysis.vercel.app/data/merged_signal.json
        run: |
          python - << 'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime, timedelta

          event_name = "${{ github.event_name }}"
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          def write_output(key: str, value: str) -> None:
              with open(output_path, "a", encoding="utf-8") as f:
                  f.write(f"{key}={value}\n")

          def write_summary(lines: list[str]) -> None:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")

          if event_name != "schedule":
              write_output("should_run", "true")
              write_output("reason", "non_schedule_event")
              write_summary([
                  "## Preflight check",
                  "",
                  f"- Event: `{event_name}`",
                  "- Result: bypass freshness check and continue.",
              ])
              raise SystemExit(0)

          token = os.environ.get("TUSHARE_TOKEN", "").strip()
          if not token:
              raise SystemExit("TUSHARE_TOKEN is required for schedule freshness check")

          latest_signal_url = os.environ.get("LATEST_SIGNAL_URL", "").strip()
          start_date = (datetime.utcnow() - timedelta(days=20)).strftime("%Y%m%d")
          end_date = datetime.utcnow().strftime("%Y%m%d")

          req_body = json.dumps({
              "api_name": "index_daily",
              "token": token,
              "params": {
                  "ts_code": "000300.SH",
                  "start_date": start_date,
                  "end_date": end_date,
              },
              "fields": "trade_date",
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.tushare.pro",
              data=req_body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              tushare_payload = json.loads(resp.read().decode("utf-8"))

          items = (((tushare_payload or {}).get("data") or {}).get("items")) or []
          if not items:
              raise SystemExit(f"Tushare returned no index_daily items: {tushare_payload}")

          latest_trade_date_raw = str(items[0][0])
          latest_trade_date = f"{latest_trade_date_raw[:4]}-{latest_trade_date_raw[4:6]}-{latest_trade_date_raw[6:8]}"

          deployed_latest_date = ""
          fetch_error = ""
          if latest_signal_url:
              try:
                  with urllib.request.urlopen(latest_signal_url, timeout=30) as resp:
                      merged_payload = json.loads(resp.read().decode("utf-8"))
                  components = (merged_payload or {}).get("components") or {}
                  relative_component = components.get("relative") if isinstance(components, dict) else {}
                  deployed_latest_date = str(
                      (relative_component or {}).get("latest_date")
                      or (merged_payload or {}).get("latest_date")
                      or ""
                  )
              except urllib.error.URLError as exc:
                  fetch_error = str(exc)
              except Exception as exc:
                  fetch_error = str(exc)

          should_run = True
          reason = "new_data_detected"
          if deployed_latest_date and deployed_latest_date >= latest_trade_date:
              should_run = False
              reason = "no_new_tushare_data"
          elif fetch_error:
              reason = "latest_signal_unavailable_run_anyway"

          write_output("should_run", "true" if should_run else "false")
          write_output("reason", reason)
          write_output("latest_trade_date", latest_trade_date)
          write_output("deployed_latest_date", deployed_latest_date or "unknown")

          lines = [
              "## Preflight check",
              "",
              f"- Event: `{event_name}`",
              f"- Tushare latest trade date: `{latest_trade_date}`",
              f"- Deployed relative latest date: `{deployed_latest_date or 'unknown'}`",
              f"- Decision: `{'run' if should_run else 'skip'}`",
              f"- Reason: `{reason}`",
          ]
          if fetch_error:
              lines.append(f"- Note: failed to fetch latest deployed signal, so workflow continues. `{fetch_error}`")
          write_summary(lines)
          PY

      - name: Checkout CSI300 Relative Index
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          path: csi300-relative-index

      - name: Checkout Equity Risk Premium
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.ERP_REPOSITORY || 'keycool/equity-risk-premium' }}
          token: ${{ secrets.CROSS_REPO_PAT || github.token }}
          path: external/equity-risk-premium

      - name: Setup Node
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r csi300-relative-index/.claude/skills/index-compare/requirements.txt
          pip install -r external/equity-risk-premium/skills/equity-risk-premium/requirements.txt

      - name: Run master orchestrator
        if: steps.preflight.outputs.should_run == 'true'
        env:
          ERP_REPO_PATH: ${{ github.workspace }}/external/equity-risk-premium
          SHARED_DIR: ${{ github.workspace }}/shared

          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

          ERP_FEISHU_WEBHOOK_URL: ${{ secrets.ERP_FEISHU_WEBHOOK_URL || secrets.FEISHU_WEBHOOK_URL }}
          ERP_FEISHU_WEBHOOK_SECRET: ${{ secrets.ERP_FEISHU_WEBHOOK_SECRET || secrets.FEISHU_WEBHOOK_SECRET }}
          ERP_FEISHU_APP_TOKEN: ${{ secrets.ERP_FEISHU_APP_TOKEN || secrets.FEISHU_BASE_ID || secrets.FEISHU_APP_TOKEN }}
          ERP_FEISHU_TABLE_ID: ${{ secrets.ERP_FEISHU_TABLE_ID || secrets.FEISHU_TABLE_ID }}

          CSI_FEISHU_WEBHOOK_URL: ${{ secrets.ERP_DAILY_FEISHU_WEBHOOK_URL || secrets.CSI_FEISHU_WEBHOOK_URL || secrets.FEISHU_WEBHOOK_URL }}
          CSI_FEISHU_WEBHOOK_SECRET: ${{ secrets.ERP_DAILY_FEISHU_WEBHOOK_SECRET || secrets.CSI_FEISHU_WEBHOOK_SECRET || secrets.FEISHU_WEBHOOK_SECRET }}
          CSI_FEISHU_WEBHOOK_KEYWORD: ERP执行日报
          CSI_FEISHU_APP_TOKEN: ${{ secrets.CSI_FEISHU_APP_TOKEN || secrets.FEISHU_APP_TOKEN }}
          CSI_FEISHU_TABLE_ID: ${{ secrets.CSI_FEISHU_TABLE_ID || secrets.FEISHU_TABLE_ID }}

          REQUIRE_BITABLE_SYNC: "true"
          FORCE_RELATIVE: ${{ github.event.inputs.force_relative || 'false' }}
          ERP_START_DATE: ${{ github.event.inputs.erp_start_date || '' }}
          ERP_END_DATE: ${{ github.event.inputs.erp_end_date || '' }}
        working-directory: csi300-relative-index
        run: |
          set -euo pipefail

          if [[ -z "${TUSHARE_TOKEN:-}" ]]; then
            echo "::error::TUSHARE_TOKEN is required for ERP data refresh"
            exit 1
          fi

          if [[ -z "${CSI_FEISHU_WEBHOOK_URL:-}" ]]; then
            echo "::warning::CSI_FEISHU_WEBHOOK_URL is empty after secret fallback resolution"
          fi

          CMD=(python orchestrator/main.py)

          if [[ "$FORCE_RELATIVE" == "true" ]]; then
            CMD+=(--force-relative)
          fi

          if [[ -n "$ERP_START_DATE" ]]; then
            CMD+=(--erp-start-date "$ERP_START_DATE")
          fi

          if [[ -n "$ERP_END_DATE" ]]; then
            CMD+=(--erp-end-date "$ERP_END_DATE")
          fi

          LOG_PATH="$RUNNER_TEMP/master_orchestrator.log"
          "${CMD[@]}" | tee "$LOG_PATH"

          python - << 'PY'
          import json
          import os
          from pathlib import Path

          log_path = Path(os.environ["RUNNER_TEMP"]) / "master_orchestrator.log"
          text = log_path.read_text(encoding="utf-8")
          lines = text.splitlines()

          payload = None
          for start in range(len(lines) - 1, -1, -1):
              candidate = "\n".join(lines[start:]).strip()
              if not candidate.startswith("{"):
                  continue
              try:
                  obj = json.loads(candidate)
              except json.JSONDecodeError:
                  continue
              if isinstance(obj, dict):
                  payload = obj
                  break

          if payload is None:
              raise SystemExit("Failed to parse orchestrator JSON result")

          latest_date = payload.get("latest_date")
          feishu_sent = bool(payload.get("feishu_sent"))
          shared_signal_path = payload.get("shared_signal_path")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("## Orchestrator result\n\n")
              f.write(f"- Latest date: `{latest_date}`\n")
              f.write(f"- Feishu sent: `{feishu_sent}`\n")
              f.write(f"- Shared signal path: `{shared_signal_path}`\n")

          if not feishu_sent:
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
                  f.write("- Warning: relative index Feishu webhook was not sent successfully; deployment continues.\n")
              print("::warning::Relative index Feishu webhook was not sent successfully; deployment continues")
          PY

      - name: Optional sync ERP data to Feishu table
        id: optional_erp_sync
        if: success() && steps.preflight.outputs.should_run == 'true' && vars.ENABLE_OPTIONAL_ERP_SYNC == 'true'
        continue-on-error: true
        timeout-minutes: 8
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          ERP_FEISHU_APP_TOKEN: ${{ secrets.ERP_FEISHU_APP_TOKEN || secrets.FEISHU_BASE_ID }}
          ERP_FEISHU_TABLE_ID: ${{ secrets.ERP_FEISHU_TABLE_ID }}
          ERP_EXPECTED_FEISHU_APP_TOKEN: O9VFbTbHZafm5psq6ebcGgF7neD
          ERP_EXPECTED_FEISHU_TABLE_ID: tble1VwP4HNtMNm2
        run: |
          python - << 'PY'
          import json, math, os, requests
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          erp_path = Path("shared/erp_signal.json")
          if not erp_path.exists():
              print("No erp_signal.json, skipping")
              exit(0)

          payload = json.loads(erp_path.read_text(encoding="utf-8"))
          records = payload.get("records", [])
          print(f"Records to sync: {len(records)}")
          print(f"ERP source latest_date: {payload.get('latest_date')}")
          if records:
              print(f"ERP last record date: {records[-1].get('date')}")

          app_id = os.environ["FEISHU_APP_ID"]
          app_secret = os.environ["FEISHU_APP_SECRET"]
          app_token = os.environ["ERP_FEISHU_APP_TOKEN"]
          table_id = os.environ["ERP_FEISHU_TABLE_ID"]
          if not app_id or not app_secret or not app_token or not table_id:
              print("::warning::Missing Feishu env; skipping optional ERP Feishu sync")
              exit(0)
          expected_app_token = os.environ.get("ERP_EXPECTED_FEISHU_APP_TOKEN", "")
          expected_table_id = os.environ.get("ERP_EXPECTED_FEISHU_TABLE_ID", "")
          app_token_ok = app_token == expected_app_token
          table_id_ok = table_id == expected_table_id
          print(f"Feishu target is expected KHF base: {app_token_ok}")
          print(f"Feishu target is expected KHF table: {table_id_ok}")
          if expected_app_token and expected_table_id and not (app_token_ok and table_id_ok):
              print("::warning::ERP Feishu target is not the expected KHF Base/Table; skipping optional sync")
              print("::warning::ERP_FEISHU_APP_TOKEN overrides FEISHU_BASE_ID when both secrets exist")
              exit(0)
          print(f"Feishu target table_id: {table_id}")
          records_url = f"https://open.feishu.cn/open-apis/bitable/v1/apps/{app_token}/tables/{table_id}/records"
          r = requests.post(
              "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              json={"app_id": app_id, "app_secret": app_secret}, timeout=15,
          )
          r.raise_for_status()
          token = r.json()["tenant_access_token"]
          h = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          sh_tz = timezone(timedelta(hours=8))

          def to_feishu_date(value):
              try:
                  d = datetime.strptime(str(value)[:10], "%Y-%m-%d").replace(tzinfo=sh_tz)
                  return int(d.timestamp() * 1000)
              except Exception:
                  return value

          def add_number_field(fields, name, value):
              if value is None:
                  return False
              if isinstance(value, (int, float)) and not math.isfinite(value):
                  return False
              fields[name] = value
              return True

          # Build date index so repeated runs update existing rows instead of duplicating them.
          print("Building date index...")
          existing_records = {}
          page_token = None
          while True:
              params = {"page_size": 500}
              if page_token:
                  params["page_token"] = page_token
              r_idx = requests.get(records_url, params=params, headers=h, timeout=30)
              r_idx.raise_for_status()
              data = r_idx.json().get("data", {})
              for item in data.get("items", []):
                  f = item.get("fields", {})
                  dt_val = f.get("日期")
                  record_id = item.get("record_id")
                  if dt_val and record_id:
                      existing_records[dt_val] = record_id
                      existing_records[to_feishu_date(dt_val)] = record_id
              if not data.get("has_more"):
                  break
              page_token = data.get("page_token")
          print(f"Existing dates: {len(existing_records)}")

          original_count = len(records)
          lookback_days = int(os.environ.get("ERP_SYNC_LOOKBACK_DAYS", "120"))
          if existing_records and lookback_days > 0:
              cutoff = datetime.now(sh_tz) - timedelta(days=lookback_days)

              def should_sync(rec):
                  dt = rec.get("date", "")
                  ts = to_feishu_date(dt)
                  if ts not in existing_records:
                      return True
                  try:
                      d = datetime.strptime(str(dt)[:10], "%Y-%m-%d").replace(tzinfo=sh_tz)
                  except Exception:
                      return True
                  return d >= cutoff

              records = [rec for rec in records if should_sync(rec)]
              print(
                  f"Records selected for sync: {len(records)} of {original_count}, "
                  f"lookback_days={lookback_days}"
              )
          else:
              print(f"Records selected for sync: {len(records)} of {original_count}, full sync")

          created = 0
          updated = 0
          failed = 0
          skipped_nonfinite_fields = 0
          for rec in records:
              dt = rec.get("date", "")
              ts = to_feishu_date(dt)

              fields = {
                  "日期": ts,
                  "数据源": "tushare+akshare",
              }
              for field_name, rec_key in (
                  ("沪深300点位", "csi300_close"),
                  ("PE_TTM", "pe_ttm"),
                  ("10年国债收益率", "bond_yield"),
                  ("盈利收益率", "earnings_yield"),
                  ("股权溢价指数", "equity_premium"),
              ):
                  if not add_number_field(fields, field_name, rec.get(rec_key)):
                      skipped_nonfinite_fields += 1
              try:
                  record_id = existing_records.get(ts)
                  if record_id:
                      r2 = requests.put(
                          f"{records_url}/{record_id}",
                          json={"fields": fields}, headers=h, timeout=15,
                      )
                      action = "UPDATE"
                  else:
                      r2 = requests.post(
                          records_url,
                          json={"fields": fields}, headers=h, timeout=15,
                      )
                      action = "CREATE"
                  if r2.status_code == 200 and r2.json().get("code") == 0:
                      if action == "UPDATE":
                          updated += 1
                      else:
                          created += 1
                  else:
                      failed += 1
                      if failed <= 5:
                          try:
                              err = r2.json()
                          except Exception:
                              err = {"text": r2.text[:200]}
                          print(f"  FAIL {action} {dt}: {r2.status_code} {str(err)[:300]}")
              except Exception as exc:
                  failed += 1
                  if failed <= 3:
                      print(f"  FAIL {dt}: {exc}")
              done = created + updated
              if done and done % 100 == 0:
                  print(f"  Progress: {done}/{len(records)}")

          print(f"ERP sync done: {created} created, {updated} updated, {failed} failed, {len(records)} total")
          if skipped_nonfinite_fields:
              print(f"Skipped non-finite numeric fields: {skipped_nonfinite_fields}")
          if failed:
              print(f"::warning::ERP Feishu sync skipped as non-blocking: {failed} failed")
          if records and created + updated == 0:
              print("::warning::ERP Feishu sync wrote zero records; continuing")
          PY

      - name: Generate ERP dashboard artifact
        if: (success() || steps.optional_erp_sync.outcome == 'failure') && steps.preflight.outputs.should_run == 'true'
        run: |
          python external/equity-risk-premium/dashboard/generate_dashboard_data.py

      - name: Upload master artifacts
        if: always() && steps.preflight.outputs.should_run == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: erp-relative-master-${{ github.run_id }}
          path: |
            shared/*.json
            csi300-relative-index/index_compare_enhanced.xlsx
            csi300-relative-index/reports/index_compare_*.html
            csi300-relative-index/.claude/skills/index-compare/data/*.json
            csi300-relative-index/.claude/skills/index-compare/data/*.csv
            csi300-relative-index/orchestrator/output/*.json
            csi300-relative-index/orchestrator/output/*.md
            external/equity-risk-premium/equity_premium_enhanced.xlsx
            external/equity-risk-premium/dashboard/data/equity_premium.json
            external/equity-risk-premium/dashboard/data/equity_premium.js
            external/equity-risk-premium/dashboard/index.html
          if-no-files-found: warn
          retention-days: 7

      - name: Setup Pages
        if: (success() || steps.optional_erp_sync.outcome == 'failure') && steps.preflight.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Build Pages site
        if: (success() || steps.optional_erp_sync.outcome == 'failure') && steps.preflight.outputs.should_run == 'true'
        run: |
          python - << 'PY'
          import json
          import re
          import shutil
          from pathlib import Path

          workspace = Path.cwd()
          site_dir = workspace / "site"
          reports_dir = workspace / "csi300-relative-index" / "reports"
          shared_dir = workspace / "shared"
          dashboard_dir = workspace / "external" / "equity-risk-premium" / "dashboard" / "data"

          site_dir.mkdir(parents=True, exist_ok=True)
          (site_dir / ".nojekyll").write_text("", encoding="utf-8")

          prod_reports = sorted(
              p for p in reports_dir.glob("index_compare_*.html")
              if re.match(r"^index_compare_\d{8}_\d{6}\.html$", p.name)
          )
          if not prod_reports:
              raise FileNotFoundError(f"No production report file found in {reports_dir}")

          latest_report = max(prod_reports, key=lambda p: p.stat().st_mtime)
          shutil.copy2(latest_report, site_dir / "index.html")

          data_dir = site_dir / "data"
          data_dir.mkdir(parents=True, exist_ok=True)

          for path in shared_dir.glob("*.json"):
              shutil.copy2(path, data_dir / path.name)

          for name in ("equity_premium.json", "equity_premium.js"):
              source = dashboard_dir / name
              if source.exists():
                  shutil.copy2(source, data_dir / name)

          merged_path = shared_dir / "merged_signal.json"
          summary = {
              "latest_report": latest_report.name,
              "generated_files": sorted([p.name for p in data_dir.glob("*")]),
          }
          if merged_path.exists():
              try:
                  summary["merged_signal"] = json.loads(merged_path.read_text(encoding="utf-8"))
              except Exception:
                  summary["merged_signal"] = {"error": "failed_to_parse"}

          (site_dir / "site_manifest.json").write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"[PAGES] Latest report: {latest_report}")
          print(f"[PAGES] Site dir: {site_dir}")
          PY

      - name: Inspect built site
        if: (success() || steps.optional_erp_sync.outcome == 'failure') && steps.preflight.outputs.should_run == 'true'
        run: |
          set -euo pipefail

          test -f site/index.html
          test -f site/site_manifest.json

          echo "## Site build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- index.html: \`present\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- site_manifest.json: \`present\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- data dir:" >> "$GITHUB_STEP_SUMMARY"
          find site/data -maxdepth 1 -type f | sort | sed 's/^/  - /' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[SITE] Manifest:"
          cat site/site_manifest.json

      - name: Deploy to Vercel
        if: (success() || steps.optional_erp_sync.outcome == 'failure') && steps.preflight.outputs.should_run == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          npm install --global vercel@latest

          mkdir -p site/.vercel
          cat > site/.vercel/project.json <<EOF
          {
            "orgId": "$VERCEL_ORG_ID",
            "projectId": "$VERCEL_PROJECT_ID"
          }
          EOF

          cd site
          DEPLOY_URL="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN")"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "## Vercel deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "[VERCEL] Deploy URL: $DEPLOY_URL"

      - name: Upload Pages artifact
        if: (success() || steps.optional_erp_sync.outcome == 'failure') && steps.preflight.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    if: success() && needs.run-master-orchestrator.result == 'success' && needs.run-master-orchestrator.outputs.should_run == 'true'
    needs: run-master-orchestrator
