name: equity-risk-premium-manual

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Optional start date (YYYYMMDD or YYYY-MM-DD)"
        required: false
        type: string
      end_date:
        description: "Optional end date (YYYYMMDD or YYYY-MM-DD)"
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: equity-risk-premium-manual
  cancel-in-progress: false

jobs:
  run-equity-premium:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: skills/equity-risk-premium/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skills/equity-risk-premium/requirements.txt

      - name: Run equity premium workflow
        env:
          START_DATE: ${{ github.event.inputs.start_date || '' }}
          END_DATE: ${{ github.event.inputs.end_date || '' }}

          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}

          EQUITY_PREMIUM_OUTPUT_PATH: ${{ github.workspace }}/equity_premium_enhanced.xlsx
        run: |
          set -euo pipefail
          cd skills/equity-risk-premium

          if [[ -n "$START_DATE" && -n "$END_DATE" ]]; then
            python main.py "$START_DATE" "$END_DATE"
          elif [[ -n "$END_DATE" ]]; then
            python main.py "$END_DATE"
          else
            python main.py
          fi

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: equity-premium-${{ github.run_id }}
          path: equity_premium_enhanced.xlsx
          if-no-files-found: error
          retention-days: 7

      - name: Show latest date in output file
        if: success()
        run: |
          python - << 'PY'
          import pandas as pd

          p = "equity_premium_enhanced.xlsx"
          df = pd.read_excel(p)
          print(f"[CHECK] Output rows: {len(df)}")
          if "日期" in df.columns and len(df) > 0:
              print(f"[CHECK] Output latest date: {df['日期'].iloc[-1]}")
          else:
              print("[CHECK] Column 日期 not found or no rows")
          PY

      - name: Generate dashboard data
        if: success()
        run: |
          python dashboard/generate_dashboard_data.py

      - name: Upload dashboard artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: equity-dashboard-${{ github.run_id }}
          path: |
            dashboard/index.html
            dashboard/data/equity_premium.json
            dashboard/data/equity_premium.js
            dashboard/README.md
          if-no-files-found: error
          retention-days: 7

